# Single-file release pipeline (modeled on jedwards1230/my-wiki's release.yml).
#
# Triggered on push to main (or manual dispatch). A `detect` job reads the merged
# PR's semver label — releases are OPT-IN: the merged PR must carry a semver:patch|minor|major label.
# No matching label → no release (no patch default). When a
# release is warranted it delegates version compute, tag creation, and AI release
# notes to the shared jedwards1230/release-workflows/ai-release.yml@v1, then
# cross-builds the static musl binaries (daemon + tray) and publishes the Release.
#
# This replaces the earlier two-file auto-release.yml + release.yml pattern: a
# `pull_request`-triggered workflow calling a *local* reusable workflow that in
# turn called a *remote* reusable workflow fails GitHub's startup validation. A
# single push-triggered workflow calling the remote reusable directly (my-wiki's
# proven shape) avoids that.
#
# The git tag is the single source of truth: the build job stamps the computed
# version into the TAGGED checkout's Cargo.toml (sed) before building, so
# CARGO_PKG_VERSION — and thus `--version` and `/status.version` — match the
# release. That edit lives only in the ephemeral tagged checkout; nothing is
# pushed back to main.

name: Release

run-name: >-
  ${{
    github.event_name == 'workflow_dispatch'
      && format('Release: {0}{1}', inputs.dry_run && 'dry-run ' || '', inputs.bump_type)
      || format('Release: {0}', github.event.head_commit.message || github.sha)
  }}

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      dry_run:
        description: "Compute version + preview notes without tagging or publishing"
        required: false
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  # ai-release.yml@v1 reads merged PRs for the changelog, and the detect job below
  # runs `gh pr list` — both need pull-requests:read. Without it the reusable call
  # fails GitHub's startup validation ("requesting 'pull-requests: read', but only
  # allowed 'pull-requests: none'"). A restricted `permissions:` block defaults
  # every unlisted scope to `none`, so it must be granted explicitly.
  pull-requests: read

jobs:
  detect:
    name: Detect bump type
    runs-on: ubuntu-latest
    outputs:
      bump_type: ${{ steps.bump.outputs.type }}
      dry_run: ${{ steps.bump.outputs.dry_run }}
      release: ${{ steps.bump.outputs.release }}
    steps:
      - name: Determine bump type
        id: bump
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Resolve TYPE / DRY / RELEASE into shell vars, then write all three
          # outputs in one grouped redirect at the end (shellcheck SC2129).
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual dispatch: use the provided inputs.
            TYPE="${{ inputs.bump_type }}"
            DRY="${{ inputs.dry_run }}"
            RELEASE="true"
          else
            # Push to main: opt-in via the merged PR's semver label. No label → no
            # release (chore merges make no noise). Retry — the GitHub API may not
            # have the merge commit indexed the instant the push event fires.
            LABELS=""
            for attempt in 1 2 3; do
              LABELS=$(gh pr list --state merged --base main --limit 100 \
                --json labels,mergeCommit \
                | jq -r --arg sha "$GITHUB_SHA" \
                  '.[] | select(.mergeCommit.oid == $sha) | .labels[].name' 2>/dev/null || echo "")
              if [ -n "$LABELS" ]; then break; fi
              echo "Attempt ${attempt}: no labels for ${GITHUB_SHA} yet, retrying in 5s..."
              sleep 5
            done
            echo "Labels for ${GITHUB_SHA}: ${LABELS:-<none>}"

            DRY="false"
            if echo "$LABELS" | grep -q 'semver:major'; then
              TYPE="major"; RELEASE="true"
            elif echo "$LABELS" | grep -q 'semver:minor'; then
              TYPE="minor"; RELEASE="true"
            elif echo "$LABELS" | grep -q 'semver:patch'; then
              TYPE="patch"; RELEASE="true"
            else
              TYPE="none"; RELEASE="false"
              echo "::notice::no semver:* label on the merged PR — skipping release"
            fi
          fi

          {
            echo "type=$TYPE"
            echo "dry_run=$DRY"
            echo "release=$RELEASE"
          } >> "$GITHUB_OUTPUT"

  prepare:
    name: Tag & Generate Notes
    needs: [detect]
    if: needs.detect.outputs.release == 'true'
    uses: jedwards1230/release-workflows/.github/workflows/ai-release.yml@v1
    with:
      service_name: gpu-arbiter
      service_description: "a root daemon that evicts Ollama from the GPU when a game launches and restores it when gaming ends"
      bump_type: ${{ needs.detect.outputs.bump_type }}
      dry_run: ${{ needs.detect.outputs.dry_run == 'true' }}
      create_release: false
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  build:
    name: Build static binaries
    needs: [detect, prepare]
    if: needs.detect.outputs.release == 'true' && needs.detect.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    container: rust:1-bookworm
    # Container jobs default to `sh`, which lacks `set -o pipefail` (a bashism).
    # rust:1-bookworm ships bash — make it the default for this job's run steps
    # so the `set -euo pipefail` in the bake/stage steps works.
    defaults:
      run:
        shell: bash
    permissions:
      contents: read
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Bake release version into Cargo.toml
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          # The git tag is the single source of truth. Stamp the package version
          # so CARGO_PKG_VERSION (→ `--version` and `/status.version`) matches the
          # release. Only the package `version = "..."` line starts at column 0;
          # dependency versions are inline (`tokio = { version = ... }`), so this
          # is unambiguous. Edits only this ephemeral tagged checkout.
          sed -i -E "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          echo "Baked version:"; grep -m1 '^version = ' Cargo.toml

      - name: Add musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Install musl tools
        run: apt-get update && apt-get install -y --no-install-recommends musl-tools

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: musl

      - name: Build (x86_64-unknown-linux-musl)
        # Builds both bins: the gpu-arbiter daemon and the gpu-arbiter-tray companion.
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Stage binaries
        run: |
          set -euo pipefail
          base=target/x86_64-unknown-linux-musl/release
          install -D "$base/gpu-arbiter" dist/gpu-arbiter-x86_64-unknown-linux-musl
          install -D "$base/gpu-arbiter-tray" dist/gpu-arbiter-tray-x86_64-unknown-linux-musl

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v7
        with:
          name: gpu-arbiter-musl
          path: dist/*
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [detect, prepare, build]
    if: needs.detect.outputs.release == 'true' && needs.detect.outputs.dry_run != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v8
        with:
          name: gpu-arbiter-musl
          path: dist

      - name: Compose release body (install snippet + AI notes)
        env:
          BODY_B64: ${{ needs.prepare.outputs.release_body }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          # ai-release.yml emits a base64-encoded body to survive GitHub Actions'
          # job-output character restrictions; decode before use.
          echo "$BODY_B64" | base64 -d > /tmp/ai_body.md

          d=dist/gpu-arbiter-x86_64-unknown-linux-musl
          t=dist/gpu-arbiter-tray-x86_64-unknown-linux-musl
          sha_d=$(sha256sum "$d" | awk '{print $1}')
          sha_t=$(sha256sum "$t" | awk '{print $1}')

          # Prepend an install snippet: how to fetch the binaries and point your
          # deployment tooling (e.g. Ansible) at this exact release (version +
          # checksum the role verifies on download).
          {
            echo "## Install"
            echo ""
            echo "Static \`x86_64-unknown-linux-musl\` binaries (no runtime deps). Daemon runs as root; the tray runs as a user service."
            echo ""
            echo '```bash'
            echo "curl -fsSL -o gpu-arbiter https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}/gpu-arbiter-x86_64-unknown-linux-musl"
            echo "curl -fsSL -o gpu-arbiter-tray https://github.com/${GITHUB_REPOSITORY}/releases/download/${VERSION}/gpu-arbiter-tray-x86_64-unknown-linux-musl"
            echo '```'
            echo ""
            echo "### Ansible (example)"
            echo ""
            echo "Point your deployment tooling at this release:"
            echo ""
            echo '```yaml'
            echo "gpu_arbiter_install_method: fetch"
            echo "gpu_arbiter_version: ${VERSION}"
            echo "gpu_arbiter_binary_sha256: ${sha_d}"
            echo "gpu_arbiter_tray_binary_sha256: ${sha_t}"
            echo '```'
            echo ""
            echo "| Artifact | sha256 |"
            echo "|----------|--------|"
            echo "| \`gpu-arbiter-x86_64-unknown-linux-musl\` | \`${sha_d}\` |"
            echo "| \`gpu-arbiter-tray-x86_64-unknown-linux-musl\` | \`${sha_t}\` |"
            echo ""
            echo "---"
            echo ""
          } > /tmp/release_body.md
          cat /tmp/ai_body.md >> /tmp/release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Release ${{ needs.prepare.outputs.version }}
          body_path: /tmp/release_body.md
          make_latest: true
          files: |
            dist/gpu-arbiter-x86_64-unknown-linux-musl
            dist/gpu-arbiter-tray-x86_64-unknown-linux-musl

      - name: Write workflow summary
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          PREV: ${{ needs.prepare.outputs.prev_tag }}
          BUMP_TYPE: ${{ needs.prepare.outputs.bump_type }}
        run: |
          {
            echo "## Release ${TAG}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Version | ${VERSION} |"
            echo "| Tag | ${TAG} |"
            echo "| Previous | ${PREV} |"
            echo "| Bump | ${BUMP_TYPE} |"
            echo "| Artifacts | \`gpu-arbiter\` + \`gpu-arbiter-tray\` (x86_64-musl) |"
          } >> "$GITHUB_STEP_SUMMARY"
