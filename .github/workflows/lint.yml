# Non-Rust lint (two-file lint/build split: Rust quality lives in rust.yml,
# everything else here). The Rust crate is the whole repo, so the only non-Rust
# surface is the GitHub Actions workflows themselves — lint them with actionlint
# so a malformed workflow is caught before it silently no-ops.

name: Lint

on:
  push:
    branches: [main]
    paths: ['.github/workflows/**']
  pull_request:
    paths: ['.github/workflows/**']

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: actionlint
        uses: raven-actions/actionlint@v2
